{% extends 'base.html' %}
{% block title %}Login - Fitness First{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-lightning-fill" style="font-size:2.5rem;color:#e63946;"></i>
            <h2 class="mt-2">Welcome Back</h2>
            <p class="text-muted">Login to your account</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
        </form>
        <p class="text-center mt-3 text-muted">Don't have an account? <a href="{% url 'register' %}" style="color:#e63946;">Register here</a></p>
    </div>
</div>
{% endblock %}
