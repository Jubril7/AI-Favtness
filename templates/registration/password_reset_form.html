{% extends 'base.html' %}
{% block title %}Forgot Password - Fitness First{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-envelope-heart-fill" style="font-size:2.5rem;color:#d4506a;"></i>
            <h2 class="mt-2">Forgot Password?</h2>
            <p class="text-muted">Enter your email and we'll send you a reset link.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Send Reset Link</button>
        </form>
        <p class="text-center mt-3"><a href="{% url 'login' %}" style="color:#d4506a;">Back to Login</a></p>
    </div>
</div>
{% endblock %}
